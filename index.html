<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <meta name="description" content="Time tracking dashboard">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Time tracking dashboard</title>
</head>
<body>
  <main>
    <div class="container">
      <div class="userDetailsContainer">
        <div class="userDetails">
          <img src="./assets/images/image-jeremy.png" alt="Jeremy image">
          <div>
            <p>Report for</p>
            <h1>Jeremy Robson</h1>
          </div>
        </div>
        <div class="periodSpecification">
          <button type="button" id="daily" class="active">daily</button>
          <button type="button" id="weekly">weekly</button>
          <button type="button" id="monthly">monthly</button>
        </div>
      </div>

      <div class="cardsContainer">
        <div class="activityCard work">
          <div class="card">
            <div>
              <p>Work</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div class="score">
              <h2></h2>
              <span></span>
            </div>
          </div>
        </div>

        <div class="activityCard play">
          <div class="card">
            <div>
              <p>Play</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div class="score">
              <h2></h2>
              <span></span>
            </div>
          </div>
        </div>

        <div class="activityCard study">
          <div class="card">
            <div>
              <p>Study</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div class="score">
              <h2></h2>
              <span></span>
            </div>
          </div>
        </div>

        <div class="activityCard exercise">
          <div class="card">
            <div>
              <p>Exercise</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div class="score">
              <h2></h2>
              <span></span>
            </div>
          </div>
        </div>

        <div class="activityCard social">
          <div class="card">
            <div>
              <p>Social</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div class="score">
              <h2></h2>
              <span></span>
            </div>
          </div>
        </div>

        <div class="activityCard self_care">
          <div class="card">
            <div>
              <p>Self Care</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div class="score">
              <h2></h2>
              <span></span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
  <script type="module" src="./script.js" defer></script>
</body>
</html>
