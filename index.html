<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <meta name="description" content="Time tracking dashboard">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Time tracking dashboard</title>
</head>
<body>
<!--
  Report for
  Jeremy Robson

  Daily
  Weekly
  Monthly

  Work-->
  <!--5hrs  daily -->
  <!--Previous - 7hrs  daily -->
  <!--32hrs   weekly -->
  <!--Previous - 36hrs   weekly -->
  <!--103hrs  monthly -->
  <!--Previous - 128hrs   monthly -->

  <!--Play-->
  <!--1hr  daily -->
  <!--Previous - 2hrs   daily -->
  <!--10hrs   weekly -->
  <!--Previous - 8hrs   weekly -->
  <!--23hrs  monthly -->
  <!--Previous - 29  monthly -->

  <!--Study-->
  <!-- 0hrs   daily -->
  <!-- Previous - 1hr   daily -->
  <!-- 4hrs   weekly -->
  <!-- Previous - 7hrs   weekly -->
  <!-- 13hrs   monthly -->
  <!-- Previous - 19hrs   monthly -->

  <!--Exercise-->
  <!--1hr  daily -->
  <!--Previous - 1hr   daily -->
  <!--4hrs   weekly -->
  <!--Previous - 5hrs   weekly -->
  <!--11hrs   monthly -->
  <!--Previous - 18hrs   monthly -->

  <!--Social-->
  <!--1hr   daily -->
  <!--Previous - 3hrs   daily -->
  <!--5hrs   weekly -->
  <!--Previous - 10hrs   weekly -->
  <!--21hrs   monthly -->
  <!--Previous - 23hrs   monthly -->

  <!--Self Care-->
  <!-- 0hrs   daily -->
  <!-- Previous - 1hr   daily -->
  <!-- 2hrs   weekly -->
  <!-- Previous - 2hrs   weekly -->
  <!-- 7hrs   monthly -->

  <main>
    <div class="container">
      <div class="userDetailsContainer">
        <div class="userDetails">
          <img src="./assets/images/image-jeremy.png" alt="Jeremy image">
          <div>
            <p>Report for</p>
            <span>Jeremy Robson</span>
          </div>
        </div>
        <div class="periodSpecification">
          <button type="button" id="daily">daily</button>
          <button type="button" id="weekly">weekly</button>
          <button type="button" id="monthly">monthly</button>
        </div>
      </div>

      <div class="cardsContainer">
        <div class="activityCard work">
          <div class="card">
            <div>
              <p>Work</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div>
              <h1>32hrs</h1>
              <span>last week-36hrs</span>
            </div>
          </div>
        </div>

        <div class="activityCard play">
          <div class="card">
            <div>
              <p>Play</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div>
              <h2>32hrs</h2>
              <span>last week-36hrs</span>
            </div>
          </div>
        </div>

        <div class="activityCard study">
          <div class="card">
            <div>
              <p>Study</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div>
              <h2>32hrs</h2>
              <span>last week-36hrs</span>
            </div>
          </div>
        </div>

        <div class="activityCard exercise">
          <div class="card">
            <div>
              <p>Exercise</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div>
              <h2>32hrs</h2>
              <span>last week-36hrs</span>
            </div>
          </div>
        </div>

        <div class="activityCard social">
          <div class="card">
            <div>
              <p>Social</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div>
              <h2>32hrs</h2>
              <span>last week-36hrs</span>
            </div>
          </div>
        </div>

        <div class="activityCard self_care">
          <div class="card">
            <div>
              <p>Self Care</p>
              <img src="./assets/images/icon-ellipsis.svg" alt>
            </div>
            <div>
              <h2>32hrs</h2>
              <span>last week-36hrs</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</body>
</html>
